name: Build
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    runs-on: buildjet-4vcpu-ubuntu-2204
    container:
      image: node:24
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: pnpm setup
        uses: pnpm/action-setup@v5
        with:
          version: 10.23.0
      - name: Install packages
        run: pnpm install
      - name: Run Build
        run: pnpm build
